<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facilitator Review — JBC Responses</title>
<style>
:root {
  --purple:#5C2D91;--gold:#F5A623;--dark:#1A0A2E;--dark2:#110718;
  --card:#1E0A3C;--mid:#7B4FBF;--light:#D8C8F0;--muted:#9070B0;
  --green:#27AE60;--red:#C0392B;--teal:#1D9E75;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--dark);color:white;min-height:100vh}
.header{background:linear-gradient(135deg,var(--purple),#3B1F6B);padding:16px 28px;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-sub{font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.header-title{font-size:20px;font-weight:bold;margin-top:3px}
.controls{padding:16px 24px;background:#0F0620;border-bottom:1px solid #3B1F6B;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.controls select,.controls input{background:#1E0A3C;border:1px solid var(--mid);border-radius:6px;color:white;padding:7px 12px;font-size:13px;font-family:sans-serif}
.controls select:focus,.controls input:focus{outline:none;border-color:var(--gold)}
.refresh-btn{background:var(--gold);border:none;border-radius:6px;padding:7px 18px;cursor:pointer;color:var(--dark);font-size:13px;font-weight:bold;font-family:sans-serif}
.refresh-btn:hover{opacity:0.85}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:16px 24px;background:#0F0620}
.stat-card{background:var(--card);border-radius:8px;padding:14px;text-align:center;border:1px solid #3B1F6B}
.stat-num{font-size:28px;font-weight:bold;color:var(--gold)}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.content{padding:20px 24px;max-width:1100px;margin:0 auto}
.cm-block{background:var(--card);border-radius:12px;margin-bottom:16px;overflow:hidden;border:1px solid #3B1F6B}
.cm-header{padding:14px 18px;background:#2D1052;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;cursor:pointer}
.cm-name{font-size:16px;font-weight:bold}
.cm-meta{font-size:11px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.cm-badge{background:var(--purple);color:white;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:bold}
.cm-body{padding:0 18px 14px}
.response-item{border-left:3px solid var(--mid);padding:10px 14px;margin:10px 0;background:#110718;border-radius:0 8px 8px 0}
.response-section{font-size:10px;color:var(--gold);font-weight:bold;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.response-session{font-size:10px;color:var(--teal);font-weight:bold;letter-spacing:1px;margin-bottom:4px}
.response-text{font-size:13px;color:var(--light);line-height:1.7;white-space:pre-wrap}
.response-time{font-size:10px;color:var(--muted);margin-top:6px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state div{font-size:36px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.error-msg{background:rgba(192,57,43,0.2);border:1px solid var(--red);border-radius:8px;padding:14px;margin:16px 24px;font-size:13px;color:#E87070}
.filter-label{font-size:11px;color:var(--muted);align-self:center}
.export-btn{background:transparent;border:1px solid var(--mid);border-radius:6px;padding:7px 14px;cursor:pointer;color:var(--light);font-size:12px;font-family:sans-serif;margin-left:auto}
.export-btn:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-sub">Teach For America · Pre-Service 2026 · Facilitator Only</div>
    <div class="header-title">⚔️ CM Response Review — Dr. Sallee</div>
  </div>
  <div style="font-size:13px;color:var(--light);font-style:italic">JBC 2 + JBC 3 · All saved responses</div>
</div>

<div class="controls">
  <span class="filter-label">Filter:</span>
  <select id="filter-session" onchange="applyFilters()">
    <option value="">All Sessions</option>
    <option value="JBC2">JBC 2 only</option>
    <option value="JBC3">JBC 3 only</option>
  </select>
  <input type="text" id="filter-name" placeholder="Search by CM name..." oninput="applyFilters()" style="width:200px" />
  <select id="filter-section" onchange="applyFilters()">
    <option value="">All Sections</option>
  </select>
  <button class="refresh-btn" onclick="loadData()">↺ Refresh</button>
  <button class="export-btn" onclick="exportCSV()">Export CSV ↓</button>
</div>

<div class="stats-row" id="stats-row">
  <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total Responses</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-cms">—</div><div class="stat-label">Unique CMs</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-jbc2">—</div><div class="stat-label">JBC 2 Responses</div></div>
  <div class="stat-card"><div class="stat-num" id="stat-jbc3">—</div><div class="stat-label">JBC 3 Responses</div></div>
</div>

<div class="content" id="main-content">
  <div class="loading">Loading responses...</div>
</div>

<script>
const SUPA_URL = 'https://sgfoxlvpfblhcomhiwsx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnZm94bHZwZmJsaGNvbWhpd3N4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjIyNDksImV4cCI6MjA5NTIzODI0OX0.SfbMqtIwE6nHSCsZDT0hS1MToFgD2lIr18Quwa8hcUk';

let allData = [];

async function loadData() {
  document.getElementById('main-content').innerHTML = '<div class="loading">Loading responses...</div>';
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/cm_responses?select=*&order=created_at.desc`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
    });
    if (!res.ok) throw new Error(await res.text());
    allData = await res.json();
    populateSectionFilter();
    applyFilters();
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="error-msg">❌ Could not load data. Make sure the cm_responses table exists in Supabase.<br><br>Error: ${e.message}</div>`;
  }
}

function populateSectionFilter() {
  const sections = [...new Set(allData.map(r => r.section))].sort();
  const sel = document.getElementById('filter-section');
  sel.innerHTML = '<option value="">All Sections</option>';
  sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const session = document.getElementById('filter-session').value;
  const name = document.getElementById('filter-name').value.toLowerCase();
  const section = document.getElementById('filter-section').value;

  let filtered = allData.filter(r => {
    if (session && r.session !== session) return false;
    if (name && !r.cm_name.toLowerCase().includes(name)) return false;
    if (section && r.section !== section) return false;
    return true;
  });

  updateStats(filtered);
  renderData(filtered);
}

function updateStats(data) {
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-cms').textContent = new Set(data.map(r => r.cm_name)).size;
  document.getElementById('stat-jbc2').textContent = data.filter(r => r.session === 'JBC2').length;
  document.getElementById('stat-jbc3').textContent = data.filter(r => r.session === 'JBC3').length;
}

function renderData(data) {
  const container = document.getElementById('main-content');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty-state"><div>📭</div><div style="font-size:16px;font-weight:bold;margin-bottom:8px">No responses yet</div><div style="font-size:13px">Responses will appear here as CMs save their work.</div></div>';
    return;
  }

  const grouped = {};
  data.forEach(r => {
    if (!grouped[r.cm_name]) grouped[r.cm_name] = [];
    grouped[r.cm_name].push(r);
  });

  container.innerHTML = Object.entries(grouped).map(([name, responses]) => {
    const sessions = [...new Set(responses.map(r => r.session))].join(', ');
    const responseHTML = responses.map(r => {
      const date = new Date(r.created_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
      return `<div class="response-item">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
          <div class="response-session">${r.session}</div>
          <div class="response-section">${r.section}</div>
        </div>
        <div class="response-text">${escHtml(r.response)}</div>
        <div class="response-time">${date}</div>
      </div>`;
    }).join('');

    return `<div class="cm-block">
      <div class="cm-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;flex-shrink:0">${name.charAt(0).toUpperCase()}</div>
          <div class="cm-name">${escHtml(name)}</div>
        </div>
        <div class="cm-meta">
          <span class="cm-badge">${responses.length} response${responses.length !== 1 ? 's' : ''}</span>
          <span>${sessions}</span>
          <span style="color:var(--muted)">▼ click to expand</span>
        </div>
      </div>
      <div class="cm-body">${responseHTML}</div>
    </div>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportCSV() {
  if (!allData.length) return alert('No data to export yet.');
  const session = document.getElementById('filter-session').value;
  const name = document.getElementById('filter-name').value.toLowerCase();
  const section = document.getElementById('filter-section').value;
  const filtered = allData.filter(r => {
    if (session && r.session !== session) return false;
    if (name && !r.cm_name.toLowerCase().includes(name)) return false;
    if (section && r.section !== section) return false;
    return true;
  });
  const rows = [['CM Name','Session','Section','Response','Saved At']];
  filtered.forEach(r => rows.push([r.cm_name, r.session, r.section, r.response.replace(/\n/g,' '), new Date(r.created_at).toLocaleString()]));
  const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `JBC_Responses_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
